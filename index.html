<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD SMC SCANNER - DARK-X-RAYHAN</title>
    <style>
        body { background-color: #0b0e14; color: #ffffff; margin: 0; padding: 10px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        header { text-align: center; padding: 10px; border-bottom: 2px solid #1e222d; background: #131722; }
        h1 { margin: 0; color: #ffb703; font-size: 22px; letter-spacing: 1px; }
        .credit { color: #00b4d8; font-weight: bold; font-size: 14px; margin-top: 5px; }
        .chart-container { display: flex; gap: 15px; margin-top: 15px; height: calc(100vh - 100px); }
        .chart-box { flex: 1; border: 2px solid #1e222d; background: #131722; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .tv-widget { width: 100%; height: 100%; }
    </style>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
</head>
<body>
    <header>
        <h1>GOLD (XAUUSD) SMART MONEY SCANNER</h1>
        <div class="credit">🔴 LIVE MONITORING PANEL | DEVELOPER: DARK-X-RAYHAN</div>
    </header>
    <div class="chart-container">
        <div class="chart-box"><div id="tv_chart_3m" class="tv-widget"></div></div>
        <div class="chart-box"><div id="tv_chart_5m" class="tv-widget"></div></div>
    </div>
    <script type="text/javascript">
        const goldSMCStudies = [
            { id: "MAExp@tv-basicstudies", inputs: { length: 20 } },
            { id: "MAExp@tv-basicstudies", inputs: { length: 50 } },
            { id: "PriceChannel@tv-basicstudies", inputs: { length: 10 } }
        ];
        new TradingView.widget({
            "container_id": "tv_chart_3m", "autosize": true, "symbol": "FX:XAUUSD", "interval": "3",
            "timezone": "Etc/UTC", "theme": "dark", "style": "1", "locale": "en", "studies": goldSMCStudies
        });
        new TradingView.widget({
            "container_id": "tv_chart_5m", "autosize": true, "symbol": "FX:XAUUSD", "interval": "5",
            "timezone": "Etc/UTC", "theme": "dark", "style": "1", "locale": "en", "studies": goldSMCStudies
        });
    </script>
</body>
</html>
