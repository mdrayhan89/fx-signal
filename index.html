<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD SMC SCANNER - DARK-X-RAYHAN</title>
    <style>
        body { background-color: #0b0e14; color: #ffffff; margin: 0; padding: 10px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        header { text-align: center; padding: 10px; border-bottom: 2px solid #1e222d; background: #131722; }
        h1 { margin: 0; color: #ffb703; font-size: 22px; letter-spacing: 1px; }
        .credit { color: #00b4d8; font-weight: bold; font-size: 14px; margin-top: 5px; }
        .chart-container { display: flex; gap: 15px; margin-top: 15px; height: calc(100vh - 100px); }
        .chart-box { flex: 1; border: 2px solid #1e222d; background: #131722; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .tv-widget { width: 100%; height: 100%; }
    </style>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
</head>
<body>
    <header>
        <h1>GOLD (XAUUSD) SMART MONEY SCANNER</h1>
        <div class="credit">🔴 LIVE MONITORING PANEL | DEVELOPER: DARK-X-RAYHAN</div>
    </header>
    <div class="chart-container">
        <div class="chart-box">
            <div id="tv_chart_3m" class="tv-widget"></div>
        </div>
        <div class="chart-box">
            <div id="tv_chart_5m" class="tv-widget"></div>
        </div>
    </div>

    <script type="text/javascript">
        // আপনার অরিজিনাল ইন্ডিকেটর লজিকের গাণিতিক প্যারামিটার (EMA 20, EMA 50 এবং 10 পিরিয়ড হাই/লো উইন্ডো)
        // এটি চার্ট লোড হওয়ার সাথে সাথে ইন্ডিকেটর লাইনগুলো স্ক্রিনে ফুটিয়ে তুলবে।
        const goldSMCStudies = [
            { id: "MAExp@tv-basicstudies", inputs: { length: 20 } }, // ema_fast = ta.ema(close, 20)
            { id: "MAExp@tv-basicstudies", inputs: { length: 50 } }, // ema_slow = ta.ema(close, 50)
            { id: "PriceChannel@tv-basicstudies", inputs: { length: 10 } } // high_signal / low_signal
        ];

        // ৩ মিনিটের লাইভ গোল্ড চার্ট জেনারেটর
        new TradingView.widget({
            "container_id": "tv_chart_3m",
            "autosize": true,
            "symbol": "FX:XAUUSD", // আপনার আগের অ্যাপেল চেঞ্জ করে এখানে গোল্ড (GOLD) সেট করা হয়েছে
            "interval": "3",
            "timezone": "Etc/UTC",
            "theme": "dark",
            "style": "1",
            "locale": "en",
            "enable_publishing": false,
            "hide_side_toolbar": false,
            "allow_symbol_change": true,
            "studies": goldSMCStudies // আপনার ইন্ডিকেটর এখানে যুক্ত করা হলো
        });

        // ৫ মিনিটের লাইভ গোল্ড চার্ট জেনারেটর
        new TradingView.widget({
            "container_id": "tv_chart_5m",
            "autosize": true,
            "symbol": "FX:XAUUSD", // গোল্ড চার্ট
            "interval": "5",
            "timezone": "Etc/UTC",
            "theme": "dark",
            "style": "1",
            "locale": "en",
            "enable_publishing": false,
            "hide_side_toolbar": false,
            "allow_symbol_change": true,
            "studies": goldSMCStudies // আপনার ইন্ডিকেটর এখানে যুক্ত করা হলো
        });
    </script>
</body>
</html>
