<<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD SMC SCANNER - DARK-X-RAYHAN</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { background-color: #0b0e14; color: #ffffff; margin: 0; padding: 10px; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        header { text-align: center; padding: 10px; border-bottom: 2px solid #1e222d; background: #131722; }
        h1 { margin: 0; color: #ffb703; font-size: 22px; letter-spacing: 1px; }
        .credit { color: #00b4d8; font-weight: bold; font-size: 14px; margin-top: 5px; }
        
        .main-container { display: flex; gap: 15px; margin-top: 15px; height: calc(100vh - 110px); }
        .chart-container { flex: 3; border: 2px solid #1e222d; background: #131722; border-radius: 8px; overflow: hidden; position: relative; min-height: 400px; }
        #live_chart { width: 100%; height: 100%; }
        
        .signal-panel { flex: 1; border: 2px solid #1e222d; background: #131722; border-radius: 8px; padding: 15px; display: flex; flex-direction: column; overflow-y: auto; }
        .panel-title { color: #ffb703; font-size: 18px; font-weight: bold; text-align: center; border-bottom: 1px solid #1e222d; padding-bottom: 10px; margin-bottom: 15px; }
        
        .signal-card { background: #1c2030; border-radius: 6px; padding: 14px; margin-bottom: 12px; border-left: 5px solid #26a69a; }
        .signal-card.sell { border-left-color: #ef5350; }
        .card-header { display: flex; justify-content: space-between; font-weight: bold; font-size: 16px; margin-bottom: 8px; }
        .buy-text { color: #26a69a; }
        .sell-text { color: #ef5350; }
        .card-body { font-size: 14px; line-height: 1.6; font-family: monospace; }
        .time-text { font-size: 11px; color: #787b86; text-align: right; margin-top: 5px; }
    </style>
</head>
<body>
    <header>
        <h1>GOLD (XAUUSD) SMART MONEY SCANNER</h1>
        <div class="credit">🔴 LIVE MONITORING PANEL | DEVELOPER: DARK-X-RAYHAN</div>
    </header>
    
    <div class="main-container">
        <div class="chart-container">
            <div id="live_chart"></div>
        </div>
        
        <div class="signal-panel">
            <div class="panel-title">⚡ LIVE AI SIGNALS</div>
            <div id="signals_container">
                <div style="text-align: center; color: #787b86; margin-top: 50px;">Connecting to Gold Market Engine...</div>
            </div>
        </div>
    </div>

    <script>
        const chartContainer = document.getElementById('live_chart');
        
        // চার্ট ক্যানভাস তৈরি
        const chart = LightweightCharts.createChart(chartContainer, {
            width: chartContainer.offsetWidth,
            height: chartContainer.offsetHeight || 500,
            layout: { backgroundColor: '#131722', textColor: '#d1d4dc' },
            grid: { vertLines: { color: '#1e222d' }, horzLines: { color: '#1e222d' } },
            crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
            rightPriceScale: { borderColor: '#2a2e39' },
            timeScale: { borderColor: '#2a2e39', timeVisible: true }
        });

        const candleSeries = chart.addCandlestickSeries({
            upColor: '#26a69a', downColor: '#ef5350', borderVisible: false,
            wickUpColor: '#26a69a', wickDownColor: '#ef5350'
        });

        // রেসপন্সিভ সাইজ ফিক্স
        new ResizeObserver(() => {
            chart.resize(chartContainer.clientWidth, chartContainer.clientHeight);
        }).observe(chartContainer);

        async function updateChartAndSignals() {
            try {
                const response = await fetch('/get-market-data');
                if (response.ok) {
                    const data = await response.json();
                    
                    // ১. চার্টে ক্যান্ডেল লোড করা
                    if(data.candles && data.candles.length > 0) {
                        candleSeries.setData(data.candles);
                    }
                    
                    // ২. চার্টের ভেতরে লাইভ ইন্ডিকেটর লেবেল এবং TP/SL রেন্ডার করা
                    if (data.markers && data.markers.length > 0) {
                        candleSeries.setMarkers(data.markers);
                    }

                    // ৩. ডানপাশের সিগন্যাল প্যানেল আপডেট
                    const container = document.getElementById('signals_container');
                    if (data.signals && data.signals.length > 0) {
                        container.innerHTML = '';
                        data.signals.forEach(sig => {
                            const isBuy = sig.action === 'BUY';
                            const card = document.createElement('div');
                            card.className = `signal-card ${isBuy ? '' : 'sell'}`;
                            card.innerHTML = `
                                <div class="card-header">
                                    <span class="${isBuy ? 'buy-text' : 'sell-text'}">🟢 GOLD ${sig.action}</span>
                                    <span>XAUUSD</span>
                                </div>
                                <div class="card-body">
                                    ⚡ <b>Entry:</b> $${sig.entry.toFixed(2)}<br>
                                    🛑 <b>SL:</b> $${sig.sl.toFixed(2)}<br>
                                    🎯 <b>TP:</b> $${sig.tp.toFixed(2)}
                                </div>
                                <div class="time-text">${sig.time}</div>
                            `;
                            container.appendChild(card);
                        });
                    }
                }
            } catch (e) { console.log("Waiting for backend data..."); }
        }

        setInterval(updateChartAndSignals, 3000);
        updateChartAndSignals();
    </script>
</body>
</html>
