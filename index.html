<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD SMC SCANNER - DARK-X-RAYHAN</title>
    <style>
        body { background-color: #0b0e14; color: #ffffff; margin: 0; padding: 10px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        header { text-align: center; padding: 10px; border-bottom: 2px solid #1e222d; background: #131722; }
        h1 { margin: 0; color: #ffb703; font-size: 22px; letter-spacing: 1px; }
        .credit { color: #00b4d8; font-weight: bold; font-size: 14px; margin-top: 5px; }
        
        /* মেইন লেআউট: চার্ট এবং সিগন্যাল প্যানেল পাশাপাশি */
        .main-container { display: flex; gap: 15px; margin-top: 15px; height: calc(100vh - 100px); }
        .charts-section { flex: 3; display: flex; gap: 15px; }
        .chart-box { flex: 1; border: 2px solid #1e222d; background: #131722; border-radius: 8px; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
        
        /* আপনার ইন্ডিকেটর দেখানোর জন্য বিশেষ প্যানেল */
        .signal-panel { flex: 1; border: 2px solid #1e222d; background: #131722; border-radius: 8px; padding: 15px; display: flex; flex-direction: column; overflow-y: auto; }
        .panel-title { color: #ffb703; font-size: 18px; font-weight: bold; text-align: center; border-bottom: 1px solid #1e222d; padding-bottom: 10px; margin-bottom: 15px; }
        
        /* ইন্ডিকেটরের সিগন্যাল বক্স স্টাইল */
        .signal-card { background: #1c2030; border-radius: 6px; padding: 12px; margin-bottom: 12px; border-left: 5px solid #26a69a; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .signal-card.sell { border-left-color: #ef5350; }
        .card-header { display: flex; justify-content: space-between; font-weight: bold; font-size: 16px; margin-bottom: 8px; }
        .buy-text { color: #26a69a; }
        .sell-text { color: #ef5350; }
        .card-body { font-size: 14px; line-height: 1.6; font-family: monospace; }
        .time-text { font-size: 11px; color: #787b86; text-align: right; margin-top: 5px; }
    </style>
</head>
<body>
    <header>
        <h1>GOLD (XAUUSD) SMART MONEY SCANNER</h1>
        <div class="credit">🔴 LIVE MONITORING PANEL | DEVELOPER: DARK-X-RAYHAN</div>
    </header>
    
    <div class="main-container">
        <div class="charts-section">
            <div class="chart-box">
                <iframe src="https://s.tradingview.com/widgetembed/?symbol=FOREXCOM%3AXAUUSD&interval=3&theme=dark&style=1&timezone=Etc%2FUTC&studies=%5B%7B%22id%22%3A%22MAExp%40tv-basicstudies%22%2C%22inputs%22%3A%7B%22length%22%3A20%7D%7D%2C%7B%22id%22%3A%22MAExp%40tv-basicstudies%22%2C%22inputs%22%3A%7B%22length%22%3A50%7D%7D%5D"></iframe>
            </div>
            <div class="chart-box">
                <iframe src="https://s.tradingview.com/widgetembed/?symbol=FOREXCOM%3AXAUUSD&interval=5&theme=dark&style=1&timezone=Etc%2FUTC&studies=%5B%7B%22id%22%3A%22MAExp%40tv-basicstudies%22%2C%22inputs%22%3A%7B%22length%22%3A20%7D%7D%2C%7B%22id%22%3A%22MAExp%40tv-basicstudies%22%2C%22inputs%22%3A%7B%22length%22%3A50%7D%7D%5D"></iframe>
            </div>
        </div>
        
        <div class="signal-panel">
            <div class="panel-title">⚡ GOLD PRECISION SMC SIGNALS</div>
            <div id="signals_container">
                <div style="text-align: center; color: #787b86; margin-top: 50px;" id="waiting_text">Waiting for confirmed candle signals...</div>
            </div>
        </div>
    </div>

    <script>
        async function fetchLiveSignals() {
            try {
                const response = await fetch('/get-signals');
                if (response.ok) {
                    const signals = await response.json();
                    if (signals.length > 0) {
                        const container = document.getElementById('signals_container');
                        const waitingText = document.getElementById('waiting_text');
                        if (waitingText) waitingText.remove();
                        
                        container.innerHTML = ''; // রিফ্রেশ
                        signals.forEach(sig => {
                            const isBuy = sig.action === 'BUY';
                            const card = document.createElement('div');
                            card.className = `signal-card ${isBuy ? '' : 'sell'}`;
                            card.innerHTML = `
                                <div class="card-header">
                                    <span class="${isBuy ? 'buy-text' : 'sell-text'}">🟢 GOLD ${sig.action}</span>
                                    <span>XAUUSD</span>
                                </div>
                                <div class="card-body">
                                    ⚡ <b>Entry:</b> $${sig.entry.toFixed(2)}<br>
                                    🛑 <b>SL:</b> $${sig.sl.toFixed(2)}<br>
                                    🎯 <b>TP:</b> $${sig.tp.toFixed(2)}
                                </div>
                                <div class="time-text">${sig.time}</div>
                            `;
                            container.appendChild(card);
                        });
                    }
                }
            } catch (e) { console.log("Signal load waiting..."); }
        }
        // প্রতি ৫ সেকেন্ড পর পর ব্যাকএন্ড থেকে ইন্ডিকেটরের ডাটা চেক করবে
        setInterval(fetchLiveSignals, 5000);
        fetchLiveSignals();
    </script>
</body>
</html>
