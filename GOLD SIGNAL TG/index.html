<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD SMC SCANNER - DARK-X-RAYHAN</title>
    <style>
        body {
            background-color: #0b0e14;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 10px;
        }
        header {
            text-align: center;
            padding: 10px;
            border-bottom: 2px solid #1e222d;
        }
        h1 { margin: 0; color: #ffb703; font-size: 24px; }
        .credit { color: #00b4d8; font-weight: bold; font-size: 14px; margin-top: 5px; }
        .chart-container {
            display: flex;
            flex-direction: row;
            gap: 10px;
            margin-top: 15px;
            height: calc(100vh - 100px);
        }
        .chart-box {
            flex: 1;
            border: 2px solid #1e222d;
            border-radius: 8px;
            overflow: hidden;
            background: #131722;
            position: relative;
        }
        .timeframe-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: bold;
            z-index: 10;
            border: 1px solid #ffb703;
        }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <header>
        <h1>GOLD (XAUUSD) SMART MONEY SCANNER</h1>
        <div class="credit">System Developer & Owner: DARK-X-RAYHAN</div>
    </header>

    <div class="chart-container">
        <div class="chart-box" id="chart-3m">
            <div class="timeframe-badge">3 MINUTES CHART</div>
            <iframe src="https://s.tradingview.com/widgetembed/?frameElementId=tradingview_3m&symbol=FX%3AXAUUSD&interval=3&theme=dark&style=1"></iframe>
        </div>

        <div class="chart-box" id="chart-5m">
            <div class="timeframe-badge">5 MINUTES CHART</div>
            <iframe src="https://s.tradingview.com/widgetembed/?frameElementId=tradingview_5m&symbol=FX%3AXAUUSD&interval=5&theme=dark&style=1"></iframe>
        </div>
    </div>

</body>
</html>
